name: Release

on:
  push:
    tags:
      - "v*" # triggers on any tag like v1.0.0, v1.2.3, etc.

jobs:
  # ── Job 1: Android APK ───────────────────────────────────────────────────────
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build web bundle
        working-directory: client
        run: npm run build

      - name: Capacitor sync
        working-directory: client
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: client/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: client/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp client/android/app/build/outputs/apk/debug/app-debug.apk \
             echodeck-${{ github.ref_name }}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          name: "EchoDeck ${{ github.ref_name }}"
          body: |
            ## EchoDeck ${{ github.ref_name }}

            ### 🖥️ Windows
            Download and run `EchoDeck-Setup.exe`

            ### 📱 Android
            1. Download `echodeck-${{ github.ref_name }}.apk` below
            2. On your phone: **Settings → Install unknown apps** → allow your browser/file manager
            3. Open the APK and install

            ### What's new
            <!-- Edit this release on GitHub to add your changelog -->
          files: echodeck-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Windows EXE ───────────────────────────────────────────────────────
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            host/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build web bundle
        working-directory: client
        run: npm run build

      - name: Install host dependencies
        working-directory: host
        run: npm ci

      # electron-builder's predist script runs @electron/rebuild automatically
      - name: Build Windows installer
        working-directory: host
        run: npm run dist
        env:
          # Tells electron-builder not to publish — we upload manually below
          EP_DRAFT: false
          EP_PRE_RELEASE: false

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        with:
          name: "EchoDeck ${{ github.ref_name }}"
          files: host/dist/EchoDeck-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
